<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurotransmitter Wheel Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f5;
  --bg-panel: #fff;
  --border: #ddd;
  --text: #222;
  --text-dim: #888;
  --font: 'Inter', sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
}

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100vh; }

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  flex-shrink: 0;
}

.header h1 { font-size: 14px; font-weight: 600; letter-spacing: 1px; }

.header-controls { display: flex; align-items: center; gap: 10px; }

.search-input {
  width: 200px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  outline: none;
}
.search-input:focus { border-color: #555; }

.theme-btn, .zoom-btn {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
}
.theme-btn:hover, .zoom-btn:hover { color: var(--text); border-color: #555; }

.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 220px;
  min-width: 220px;
  padding: 12px;
  overflow-y: auto;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); }

.section-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.filter-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 5px 8px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--text);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  text-align: left;
}
.filter-btn:hover { background: var(--border); }
.filter-btn.inactive { opacity: 0.3; }

.filter-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.filter-count { margin-left: auto; font-size: 10px; color: var(--text-dim); }

.reset-btn {
  width: 100%;
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
}
.reset-btn:hover { color: var(--text); border-color: #555; }

/* STATS */
.stats { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px; }
.stat-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 11px; }
.stat-label { color: var(--text-dim); display: flex; align-items: center; gap: 4px; }
.stat-value { font-weight: 600; }
.stat-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* WHEEL */
.wheel-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  min-width: 0;
}
.wheel-area svg { display: block; }

.zoom-controls {
  position: absolute;
  bottom: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 20;
}

/* TOOLTIP */
.tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  z-index: 9999;
  opacity: 0;
  max-width: 340px;
  font-size: 12px;
  line-height: 1.5;
}
.tooltip.visible { opacity: 1; }
.tooltip-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.tooltip-abbr { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.tooltip-row { margin-top: 3px; color: var(--text-dim); font-size: 11px; }
.tooltip-row strong { color: var(--text); }
.tooltip-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
}

/* DETAIL PANEL */
.detail-panel {
  position: absolute;
  top: 0; right: 0;
  width: 340px;
  height: 100%;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  z-index: 50;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
}
.detail-panel.open { transform: translateX(0); }

.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.detail-title { font-size: 16px; font-weight: 700; }
.detail-abbr { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.detail-close {
  width: 24px; height: 24px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.detail-close:hover { color: var(--text); }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px 20px;
}
.detail-body::-webkit-scrollbar { width: 3px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border); }

.detail-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.detail-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }

.detail-section { margin-bottom: 12px; }
.detail-section-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 3px;
}
.detail-section-value { font-size: 12px; color: var(--text); line-height: 1.5; }

@media (max-width: 700px) {
  .sidebar { display: none; }
  .detail-panel { width: 100%; }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>NEUROTRANSMITTER WHEEL</h1>
    <div class="header-controls">
      <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off">
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="sidebar">
      <div id="categoryFilters"><div class="section-title">Categories</div></div>
      <div id="effectFilters"><div class="section-title">Postsynaptic Effect</div></div>
      <button class="reset-btn" id="resetBtn">Show All</button>
      <div class="stats" id="statsPanel">
        <div class="section-title">Statistics</div>
        <div id="statsContent"></div>
      </div>
    </aside>

    <div class="wheel-area" id="wheelArea">
      <svg id="wheelSvg"></svg>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
        <button class="zoom-btn" id="zoomOut" title="Zoom out">&minus;</button>
        <button class="zoom-btn" id="zoomReset" title="Reset zoom">&#8634;</button>
      </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div>
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-abbr" id="detailAbbr"></div>
        </div>
        <button class="detail-close" id="detailClose">&times;</button>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>
</div>

<script>
/* DATA */
const ntData = {{ nt_data | tojson | safe }};
const categoryColors = {{ category_colors | tojson | safe }};
const effectColors = {{ effect_colors | tojson | safe }};
const categories = {{ categories | tojson | safe }};

/* STATE */
let activeCategories = new Set(categories);
let activeEffects = new Set(Object.keys(effectColors));
let selectedNT = null;
let searchTerm = '';
let hoverOutTimer = null;

/* RING RADII — scaled for VIEW=1000 so text renders large on screen */
const R0_IN = 0,   R0_OUT = 105;
const R1_IN = 110, R1_OUT = 235;
const R2_IN = 239, R2_OUT = 265;
const R3_IN = 269, R3_OUT = 355;
const R4_IN = 359, R4_OUT = 440;
const VIEW = 900;
const PAD = 0.006;
const CAT_PAD = 0.014;

/* HELPERS */
function getVisible() {
  let d = ntData.filter(n => activeCategories.has(n.category) && activeEffects.has(n.postsynaptic_effect));
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    d = d.filter(n => n.name.toLowerCase().includes(t) || n.abbreviation.toLowerCase().includes(t));
  }
  return d.sort((a, b) => {
    const ci = categories.indexOf(a.category) - categories.indexOf(b.category);
    return ci !== 0 ? ci : a.id - b.id;
  });
}

function computeLayout(data) {
  const groups = [];
  const map = new Map();
  data.forEach(n => {
    if (!map.has(n.category)) { const g = { category: n.category, nts: [] }; map.set(n.category, g); groups.push(g); }
    map.get(n.category).nts.push(n);
  });
  groups.sort((a, b) => categories.indexOf(a.category) - categories.indexOf(b.category));

  const N = data.length;
  if (N === 0) return { segs: [], cats: [] };
  const angle = 2 * Math.PI / N;
  const segs = [], cats = [];
  let cur = 0;

  groups.forEach(g => {
    const start = cur;
    g.nts.forEach(nt => {
      segs.push({ nt, s: cur + PAD / 2, e: cur + angle - PAD / 2, m: cur + angle / 2 });
      cur += angle;
    });
    cats.push({ cat: g.category, color: categoryColors[g.category] || '#555', s: start + CAT_PAD / 2, e: cur - CAT_PAD / 2, m: (start + cur) / 2, n: g.nts.length });
  });
  return { segs, cats };
}

function arcDeg(s, e) { return (e - s) * 180 / Math.PI; }

function textRot(mid) {
  // Convert to degrees, offset so 0 = pointing right along radius
  let d = mid * 180 / Math.PI - 90;
  // Normalize to -180..180
  while (d > 180) d -= 360;
  while (d < -180) d += 360;
  // Keep between -90..90 so text is NEVER upside down
  if (d > 90) d -= 180;
  if (d < -90) d += 180;
  return d;
}

function trunc(t, max) { return !t ? '' : t.length > max ? t.slice(0, max - 1) + '\u2026' : t; }

function lighten(hex, p) {
  let [r, g, b] = [1,3,5].map(i => parseInt(hex.slice(i, i+2), 16));
  r = Math.min(255, r + Math.round((255 - r) * p));
  g = Math.min(255, g + Math.round((255 - g) * p));
  b = Math.min(255, b + Math.round((255 - b) * p));
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

function darken(hex, p) {
  let [r, g, b] = [1,3,5].map(i => parseInt(hex.slice(i, i+2), 16));
  r = Math.max(0, Math.round(r * (1 - p)));
  g = Math.max(0, Math.round(g * (1 - p)));
  b = Math.max(0, Math.round(b * (1 - p)));
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

/* Light-mode opacity and stroke helpers */
function segStroke() { return '#999'; }
function catOpacity() { return 0.85; }
function ntOpacity() { return 0.75; }
function effOpacity() { return 0.85; }
function precOpacity() { return 0.55; }
function locOpacity() { return 0.45; }
function ringColor(hex, ring) {
  if (ring === 3) return darken(hex, 0.1);
  if (ring === 4) return darken(hex, 0.2);
  return darken(hex, 0.05);
}

/* FILTERS */
function buildFilters() {
  const catC = document.getElementById('categoryFilters');
  catC.querySelectorAll('.filter-btn').forEach(b => b.remove());
  categories.forEach(cat => {
    const c = ntData.filter(n => n.category === cat).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.category = cat;
    btn.innerHTML = `<span class="filter-dot" style="background:${categoryColors[cat]}"></span><span>${cat}</span><span class="filter-count">${c}</span>`;
    btn.onclick = () => { toggleCat(cat, btn); };
    catC.appendChild(btn);
  });

  const effC = document.getElementById('effectFilters');
  effC.querySelectorAll('.filter-btn').forEach(b => b.remove());
  Object.keys(effectColors).forEach(eff => {
    const c = ntData.filter(n => n.postsynaptic_effect === eff).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.effect = eff;
    btn.innerHTML = `<span class="filter-dot" style="background:${effectColors[eff]}"></span><span>Postsynaptic Effect: ${eff}</span><span class="filter-count">${c}</span>`;
    btn.onclick = () => { toggleEff(eff, btn); };
    effC.appendChild(btn);
  });
}

function toggleCat(cat, btn) {
  if (activeCategories.has(cat)) { activeCategories.delete(cat); btn.classList.add('inactive'); }
  else { activeCategories.add(cat); btn.classList.remove('inactive'); }
  redraw();
}

function toggleEff(eff, btn) {
  if (activeEffects.has(eff)) { activeEffects.delete(eff); btn.classList.add('inactive'); }
  else { activeEffects.add(eff); btn.classList.remove('inactive'); }
  redraw();
}

document.getElementById('resetBtn').onclick = () => {
  activeCategories = new Set(categories);
  activeEffects = new Set(Object.keys(effectColors));
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('inactive'));
  hideDetail();
  redraw();
};

document.getElementById('searchInput').addEventListener('input', function() {
  searchTerm = this.value.trim();
  redraw();
});

function redraw() { drawWheel(); updateStats(); }

/* STATS */
function updateStats() {
  const vis = getVisible();
  let h = `<div class="stat-row"><span class="stat-label">Visible</span><span class="stat-value">${vis.length} / ${ntData.length}</span></div><hr class="stat-divider">`;
  Object.keys(effectColors).forEach(e => {
    const c = vis.filter(n => n.postsynaptic_effect === e).length;
    h += `<div class="stat-row"><span class="stat-label"><span style="width:6px;height:6px;border-radius:50%;background:${effectColors[e]};display:inline-block"></span> ${e}</span><span class="stat-value">${c}</span></div>`;
  });
  h += '<hr class="stat-divider">';
  categories.forEach(cat => {
    const c = vis.filter(n => n.category === cat).length;
    if (c > 0) h += `<div class="stat-row"><span class="stat-label"><span style="width:6px;height:6px;border-radius:50%;background:${categoryColors[cat]};display:inline-block"></span> ${cat}</span><span class="stat-value">${c}</span></div>`;
  });
  document.getElementById('statsContent').innerHTML = h;
}

/* DETAIL PANEL */
function showDetail(nt) {
  selectedNT = nt;
  document.getElementById('detailTitle').textContent = nt.name;
  document.getElementById('detailAbbr').textContent = nt.abbreviation;
  const cc = categoryColors[nt.category] || '#555';
  const ec = effectColors[nt.postsynaptic_effect] || '#888';

  let h = '<div class="detail-badges">';
  h += `<span class="detail-badge" style="background:${cc}22;color:${cc};border:1px solid ${cc}44"><span class="badge-dot" style="background:${cc}"></span>${nt.category}</span>`;
  h += `<span class="detail-badge" style="background:${ec}22;color:${ec};border:1px solid ${ec}44"><span class="badge-dot" style="background:${ec}"></span>Postsynaptic Effect: ${nt.postsynaptic_effect}</span>`;
  h += '</div>';

  [['Postsynaptic Detail', nt.postsynaptic_detail],
   ['Precursor / Biosynthetic Pathway', nt.precursor],
   ['Synthesis Enzyme', nt.synthesis_enzyme],
   ['Receptor Types', nt.receptor_types],
   ['Primary Brain Regions', nt.primary_location],
   ['Behavioral / Functional Roles', nt.behavioral_role],
   ['Associated Disorders', nt.disorders],
   ['Key Pharmacological Targets', nt.drugs]
  ].forEach(([l, v]) => {
    if (v) h += `<div class="detail-section"><div class="detail-section-label">${l}</div><div class="detail-section-value">${v}</div></div>`;
  });

  document.getElementById('detailBody').innerHTML = h;
  document.getElementById('detailPanel').classList.add('open');
}

function hideDetail() {
  selectedNT = null;
  document.getElementById('detailPanel').classList.remove('open');
  clearHL();
}

document.getElementById('detailClose').onclick = hideDetail;

/* TOOLTIP */
const ttEl = document.getElementById('tooltip');

function showTT(nt, ev) {
  const ec = effectColors[nt.postsynaptic_effect] || '#888';
  let h = `<div class="tooltip-name">${nt.name}</div>`;
  h += `<div class="tooltip-abbr">${nt.abbreviation}</div>`;
  h += `<div class="tooltip-row"><strong>Category:</strong> ${nt.category}</div>`;
  h += `<div class="tooltip-row"><strong>Postsynaptic Effect:</strong> <span class="tooltip-badge" style="background:${ec}">${nt.postsynaptic_effect}</span></div>`;
  h += `<div class="tooltip-row"><strong>Precursor:</strong> ${nt.precursor}</div>`;
  h += `<div class="tooltip-row"><strong>Location:</strong> ${nt.primary_location}</div>`;
  h += `<div class="tooltip-row"><strong>Function:</strong> ${trunc(nt.behavioral_role, 80)}</div>`;
  ttEl.innerHTML = h;
  ttEl.classList.add('visible');
  posTT(ev);
}

function posTT(ev) {
  let x = ev.clientX + 14, y = ev.clientY + 14;
  const r = ttEl.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 10) x = ev.clientX - r.width - 14;
  if (y + r.height > window.innerHeight - 10) y = ev.clientY - r.height - 14;
  ttEl.style.left = x + 'px';
  ttEl.style.top = y + 'px';
}

function hideTT() { ttEl.classList.remove('visible'); }

/* ZOOM */
let zoomBehavior;
let zoomG;

document.getElementById('zoomIn').onclick = () => {
  d3.select('#wheelSvg').transition().duration(300).call(zoomBehavior.scaleBy, 1.4);
};
document.getElementById('zoomOut').onclick = () => {
  d3.select('#wheelSvg').transition().duration(300).call(zoomBehavior.scaleBy, 0.7);
};
document.getElementById('zoomReset').onclick = () => {
  d3.select('#wheelSvg').transition().duration(300).call(zoomBehavior.transform, d3.zoomIdentity);
};

/* DRAW WHEEL */
function drawWheel() {
  const visible = getVisible();
  const { segs, cats } = computeLayout(visible);

  const svg = d3.select('#wheelSvg');
  svg.selectAll('*').remove();

  const area = document.getElementById('wheelArea');
  const size = Math.min(area.clientWidth, area.clientHeight);
  svg.attr('width', size).attr('height', size)
     .attr('viewBox', `${-VIEW/2} ${-VIEW/2} ${VIEW} ${VIEW}`);

  // Zoom
  zoomBehavior = d3.zoom()
    .scaleExtent([0.5, 8])
    .on('zoom', (e) => { zoomG.attr('transform', e.transform); });
  svg.call(zoomBehavior);

  zoomG = svg.append('g').attr('class', 'zoomable');

  if (segs.length === 0) {
    zoomG.append('text').attr('text-anchor', 'middle').attr('dy', '0.35em')
      .attr('fill', '#888').attr('font-size', 14).attr('font-family', 'Inter, sans-serif')
      .text('No results');
    return;
  }

  // Guide circles
  [R0_OUT, R1_OUT, R2_OUT, R3_OUT, R4_OUT].forEach(r => {
    zoomG.append('circle').attr('r', r).attr('fill', 'none')
      .attr('stroke', '#bbb').attr('stroke-width', 0.5);
  });

  // RING 0: Categories
  const catArc = d3.arc().innerRadius(R0_IN).outerRadius(R0_OUT);
  const catG = zoomG.append('g').attr('data-ring', 'cat');

  // Pass 1: compute a UNIFORM font size that fits ALL visible category labels
  const catTextR = (R0_IN + R0_OUT) / 2;
  const catAvailLen = R0_OUT * 2.2;
  let uniformCatFont = 16; // start at max
  cats.forEach(cs => {
    const arcW = (cs.e - cs.s) * catTextR;
    const fontByArc = Math.min(16, arcW * 0.55);
    const fontByLen = catAvailLen / (cs.cat.length * 0.52);
    uniformCatFont = Math.min(uniformCatFont, fontByArc, fontByLen);
  });
  uniformCatFont = Math.max(4, uniformCatFont); // floor

  // Pass 2: render all category segments and labels at uniform size
  cats.forEach(cs => {
    const g = catG.append('g');
    g.append('path')
      .attr('d', catArc({ startAngle: cs.s, endAngle: cs.e }))
      .attr('fill', darken(cs.color, 0.05)).attr('fill-opacity', catOpacity())
      .attr('stroke', segStroke()).attr('stroke-width', 0.5)
      .style('cursor', 'pointer')
      .on('click', (ev) => {
        ev.stopPropagation();
        const only = activeCategories.size === 1 && activeCategories.has(cs.cat);
        activeCategories = only ? new Set(categories) : new Set([cs.cat]);
        document.querySelectorAll('#categoryFilters .filter-btn').forEach(btn => {
          activeCategories.has(btn.dataset.category) ? btn.classList.remove('inactive') : btn.classList.add('inactive');
        });
        redraw();
      });

    // Label — uniform font size, text radiates from center, never upside down
    const arcW = (cs.e - cs.s) * catTextR;
    if (arcW >= uniformCatFont * 0.8) {
      const rot = textRot(cs.m);
      const x = catTextR * Math.cos(cs.m - Math.PI / 2);
      const y = catTextR * Math.sin(cs.m - Math.PI / 2);
      g.append('text').attr('x', x).attr('y', y)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('transform', `rotate(${rot},${x},${y})`)
        .attr('fill', '#fff').attr('font-size', uniformCatFont)
        .attr('font-weight', 700).attr('font-family', 'Inter, sans-serif')
        .text(cs.cat)
        .style('pointer-events', 'none');
    }
  });

  // RING 1: NT Names
  const ntArc = d3.arc().innerRadius(R1_IN).outerRadius(R1_OUT);
  const ntG = zoomG.append('g').attr('data-ring', 'nt');

  segs.forEach(seg => {
    const cc = categoryColors[seg.nt.category] || '#555';
    const g = ntG.append('g').attr('data-id', seg.nt.id);

    g.append('path')
      .attr('d', ntArc({ startAngle: seg.s, endAngle: seg.e }))
      .attr('fill', ringColor(cc, 1)).attr('fill-opacity', ntOpacity())
      .attr('stroke', segStroke()).attr('stroke-width', 0.3)
      .style('cursor', 'pointer');

    // NT abbreviation — font scaled to arc width; full abbreviation shown if readable
    const ntTextR = (R1_IN + R1_OUT) / 2;
    const ntArcW = (seg.e - seg.s) * ntTextR;
    if (ntArcW > 5) {
      const rot = textRot(seg.m);
      const x = ntTextR * Math.cos(seg.m - Math.PI / 2);
      const y = ntTextR * Math.sin(seg.m - Math.PI / 2);
      const abbr = seg.nt.abbreviation;
      const fontByArc = Math.min(12, Math.max(4, ntArcW * 0.55));
      const availLength = (R1_OUT - R1_IN) * 1.3;
      const fontByLength = availLength / (abbr.length * 0.6);
      const fontSize = Math.min(fontByArc, fontByLength, 12);
      if (fontSize >= 4) {
        g.append('text').attr('x', x).attr('y', y)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
          .attr('transform', `rotate(${rot},${x},${y})`)
          .attr('fill', '#fff').attr('font-size', fontSize)
          .attr('font-weight', 600).attr('font-family', 'Inter, sans-serif')
          .text(abbr)
          .style('pointer-events', 'none');
      }
    }
  });

  // RING 2: Postsynaptic Effect band (color only)
  const effArc = d3.arc().innerRadius(R2_IN).outerRadius(R2_OUT);
  const effG = zoomG.append('g').attr('data-ring', 'eff');
  segs.forEach(seg => {
    effG.append('path')
      .attr('d', effArc({ startAngle: seg.s, endAngle: seg.e }))
      .attr('fill', effectColors[seg.nt.postsynaptic_effect] || '#888')
      .attr('fill-opacity', effOpacity())
      .attr('stroke', segStroke()).attr('stroke-width', 0.2)
      .attr('data-id', seg.nt.id).style('cursor', 'pointer');
  });

  // RING 3: Precursor (color only — no text, info on hover)
  const precArc = d3.arc().innerRadius(R3_IN).outerRadius(R3_OUT);
  const precG = zoomG.append('g').attr('data-ring', 'prec');
  segs.forEach(seg => {
    const cc = ringColor(categoryColors[seg.nt.category] || '#555', 3);
    precG.append('path')
      .attr('d', precArc({ startAngle: seg.s, endAngle: seg.e }))
      .attr('fill', cc).attr('fill-opacity', precOpacity())
      .attr('stroke', segStroke()).attr('stroke-width', 0.2)
      .attr('data-id', seg.nt.id).style('cursor', 'pointer');
  });

  // RING 4: Location (color only — no text, info on hover)
  const locArc = d3.arc().innerRadius(R4_IN).outerRadius(R4_OUT);
  const locG = zoomG.append('g').attr('data-ring', 'loc');
  segs.forEach(seg => {
    const cc = ringColor(categoryColors[seg.nt.category] || '#555', 4);
    locG.append('path')
      .attr('d', locArc({ startAngle: seg.s, endAngle: seg.e }))
      .attr('fill', cc).attr('fill-opacity', locOpacity())
      .attr('stroke', segStroke()).attr('stroke-width', 0.2)
      .attr('data-id', seg.nt.id).style('cursor', 'pointer');
  });

  // Center: empty — clean look

  // INTERACTION OVERLAY — no gaps so mouse transitions are seamless
  const hitArc = d3.arc().innerRadius(R0_IN).outerRadius(R4_OUT).padAngle(0);
  const hitG = zoomG.append('g');

  segs.forEach(seg => {
    hitG.append('path')
      .attr('d', hitArc({ startAngle: seg.s - PAD / 2, endAngle: seg.e + PAD / 2 }))
      .attr('fill', 'transparent').attr('stroke', 'none')
      .style('cursor', 'pointer')
      .on('mouseenter', (ev) => {
        clearTimeout(hoverOutTimer);
        highlightNT(seg.nt.id);
        showTT(seg.nt, ev);
      })
      .on('mousemove', (ev) => { posTT(ev); })
      .on('mouseleave', () => {
        hoverOutTimer = setTimeout(() => { if (!selectedNT) clearHL(); hideTT(); }, 30);
      })
      .on('click', (ev) => { ev.stopPropagation(); showDetail(seg.nt); highlightNT(seg.nt.id); });
  });

  if (selectedNT) {
    const still = segs.find(s => s.nt.id === selectedNT.id);
    if (still) highlightNT(selectedNT.id);
  }
}

/* HIGHLIGHT */
function highlightNT(id) {
  const svg = d3.select('#wheelSvg');
  // Dim/highlight per-NT paths (rings 2,3,4)
  svg.selectAll('path[data-id]').each(function() {
    const el = d3.select(this);
    el.attr('fill-opacity', +el.attr('data-id') === id ? 0.95 : 0.06);
  });
  // Dim/highlight NT name ring groups
  svg.selectAll('g[data-id]').each(function() {
    const g = d3.select(this);
    const match = +g.attr('data-id') === id;
    g.select('path').attr('fill-opacity', match ? 0.9 : 0.08);
    g.select('text').attr('fill-opacity', match ? 1 : 0.1);
  });
  // Dim category ring
  svg.selectAll('[data-ring="cat"] path').attr('fill-opacity', 0.2);
}

function clearHL() {
  // Tag each ring group in drawWheel so we can reset properly
  const svg = d3.select('#wheelSvg');
  svg.selectAll('[data-ring="cat"] path').attr('fill-opacity', catOpacity());
  svg.selectAll('[data-ring="nt"] path').attr('fill-opacity', ntOpacity());
  svg.selectAll('[data-ring="nt"] text').attr('fill-opacity', 1);
  svg.selectAll('[data-ring="eff"] path').attr('fill-opacity', effOpacity());
  svg.selectAll('[data-ring="prec"] path').attr('fill-opacity', precOpacity());
  svg.selectAll('[data-ring="loc"] path').attr('fill-opacity', locOpacity());
}

/* CLICK OUTSIDE */
document.addEventListener('click', (e) => {
  if (selectedNT && !document.getElementById('detailPanel').contains(e.target) &&
      !document.getElementById('sidebar').contains(e.target) &&
      !e.target.closest('.zoomable')) {
    hideDetail();
  }
});

/* RESIZE */
let resizeT;
window.addEventListener('resize', () => { clearTimeout(resizeT); resizeT = setTimeout(() => drawWheel(), 150); });

/* INIT */
function init() {
  buildFilters();
  updateStats();
  drawWheel();
}

if (document.fonts && document.fonts.ready) document.fonts.ready.then(init);
else window.addEventListener('load', init);
</script>
</body>
